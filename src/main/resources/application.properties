spring.application.name=GestionSaberPro

# ── Base de Datos ──────────────────────────────────────────
# En Render, DATABASE_URL viene como: postgresql://user:pass@host/db
# Spring necesita: jdbc:postgresql://user:pass@host/db
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA ───────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ── Thymeleaf ─────────────────────────────────────────────
spring.thymeleaf.cache=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ── Servidor ──────────────────────────────────────────────
server.port=${PORT:8081}

# ── Multipart ─────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Actuator (para healthcheck de Render) ─────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ── Logging ───────────────────────────────────────────────
logging.level.com.uts.gestionsaberpro=INFO
logging.level.org.springframework.security=WARN
