<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Mis Resultados</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
<style>* { font-family:'Segoe UI',sans-serif; } body{background:#f0f4f8;} .topbar{background:#0d1f3c;color:#fff;padding:.85rem 1.5rem;}
.card-p{background:#fff;border-radius:14px;border:1px solid #e2e8f0;overflow:hidden;}
.table thead th{background:#0d1f3c;color:#fff;font-size:.78rem;}
.badge-sup{background:#dcfce7;color:#166534;border-radius:4px;padding:.15rem .5rem;font-size:.72rem;font-weight:700;}
.badge-alto{background:#fef9c3;color:#854d0e;border-radius:4px;padding:.15rem .5rem;font-size:.72rem;font-weight:700;}
.badge-medio{background:#e0f2fe;color:#075985;border-radius:4px;padding:.15rem .5rem;font-size:.72rem;font-weight:700;}
.badge-otro{background:#f1f5f9;color:#475569;border-radius:4px;padding:.15rem .5rem;font-size:.72rem;font-weight:700;}
</style>
</head>
<body>
<div class="topbar d-flex justify-content-between align-items-center">
    <span class="fw-bold"><i class="bi bi-graph-up me-2" style="color:#D4AF37;"></i>Todos mis Resultados Saber Pro</span>
    <a th:href="@{/estudiante/dashboard}" class="btn btn-sm btn-outline-light">← Volver</a>
</div>
<div class="container-fluid py-4 px-4">
    <div class="card-p">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead><tr>
                    <th>Fecha</th><th>Puntaje Global</th><th>Nivel</th>
                    <th>Com. Escrita</th><th>Raz. Cuantitativo</th><th>Lect. Crítica</th>
                    <th>Comp. Ciudadanas</th><th>Inglés</th><th>Beneficio</th>
                </tr></thead>
                <tbody>
                    <tr th:each="r : ${resultados}">
                        <td th:text="${r.fechaExamen}"></td>
                        <td><strong th:text="${r.puntajeGlobal}"></strong></td>
                        <td>
                            <span th:if="${r.nivelGlobal?.name() == 'SUPERIOR'}" class="badge-sup" th:text="${r.nivelGlobal}"></span>
                            <span th:if="${r.nivelGlobal?.name() == 'ALTO'}" class="badge-alto" th:text="${r.nivelGlobal}"></span>
                            <span th:if="${r.nivelGlobal?.name() == 'MEDIO'}" class="badge-medio" th:text="${r.nivelGlobal}"></span>
                            <span th:if="${r.nivelGlobal?.name() != 'SUPERIOR' and r.nivelGlobal?.name() != 'ALTO' and r.nivelGlobal?.name() != 'MEDIO'}" class="badge-otro" th:text="${r.nivelGlobal}"></span>
                        </td>
                        <td th:text="${r.comunicacionEscrita}"></td>
                        <td th:text="${r.razonamientoCuantitativo}"></td>
                        <td th:text="${r.lecturaCritica}"></td>
                        <td th:text="${r.competenciasCiudadanas}"></td>
                        <td th:text="${r.ingles}"></td>
                        <td th:text="${r.descripcionBeneficio ?: 'Sin beneficio'}"></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(resultados)}">
                        <td colspan="9" class="text-center text-muted py-4">No hay resultados registrados aún</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body></html>
