<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Perfil</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
<style>* { font-family:'Segoe UI',sans-serif; } body{background:#f0f4f8;} .topbar{background:#0d1f3c;color:#fff;padding:.85rem 1.5rem;} .card-p{background:#fff;border-radius:14px;border:1px solid #e2e8f0;} .lbl{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#8492a6;} .val{font-size:.9rem;color:#1a202c;font-weight:500;}</style>
</head>
<body>
<div class="topbar d-flex justify-content-between align-items-center">
    <span class="fw-bold"><i class="bi bi-mortarboard-fill me-2" style="color:#D4AF37;"></i>Mis Datos Personales</span>
    <a th:href="@{/estudiante/dashboard}" class="btn btn-sm btn-outline-light">← Volver</a>
</div>
<div class="container py-4" style="max-width:600px;">
    <div class="card-p p-4">
        <div th:if="${estudiante}">
            <div class="row g-3">
                <div class="col-6"><div class="lbl">Documento</div><div class="val" th:text="${estudiante.usuario.tipoDocumento + ' ' + estudiante.usuario.documento}"></div></div>
                <div class="col-6"><div class="lbl">Nombre Completo</div><div class="val" th:text="${estudiante.usuario.nombreCompleto}"></div></div>
                <div class="col-6"><div class="lbl">Correo</div><div class="val" th:text="${estudiante.usuario.correo}"></div></div>
                <div class="col-6"><div class="lbl">Teléfono</div><div class="val" th:text="${estudiante.usuario.telefono ?: '-'}"></div></div>
                <div class="col-6"><div class="lbl">Programa</div><div class="val" th:text="${estudiante.programa?.nombre ?: '-'}"></div></div>
                <div class="col-6"><div class="lbl">Tipo Programa</div><div class="val" th:text="${estudiante.programa?.tipo ?: '-'}"></div></div>
                <div class="col-6"><div class="lbl">Semestre</div><div class="val" th:text="${estudiante.semestre}"></div></div>
                <div class="col-6"><div class="lbl">Nº Registro</div><div class="val" th:text="${estudiante.numeroRegistro ?: '-'}"></div></div>
            </div>
        </div>
    </div>
</div>
</body></html>
