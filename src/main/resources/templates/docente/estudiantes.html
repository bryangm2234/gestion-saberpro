<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Gestión Alumnos</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css"/>
<style>* {font-family:'Segoe UI',sans-serif;} body{background:#f0f4f8;} .topbar{background:#0e7490;color:#fff;padding:.85rem 1.75rem;}
.card-p{background:#fff;border-radius:14px;border:1px solid #e2e8f0;overflow:hidden;}
.table thead th{background:#0e7490;color:#fff;font-size:.78rem;}
.badge-active{background:#dcfce7;color:#166534;border-radius:4px;padding:.15rem .5rem;font-size:.72rem;font-weight:700;}
</style>
</head>
<body>
<div class="topbar d-flex justify-content-between align-items-center">
    <span class="fw-bold"><i class="bi bi-people me-2" style="color:#D4AF37;"></i>Gestión de Alumnos</span>
    <a th:href="@{/docente/dashboard}" class="btn btn-sm btn-outline-light">← Volver</a>
</div>
<div class="container-fluid p-4">
    <div class="card-p">
        <div class="table-responsive">
            <table class="table table-hover mb-0 datatable" id="tablaEstudiantes">
                <thead><tr>
                    <th>Documento</th><th>Nombre Completo</th><th>Programa</th>
                    <th>Semestre</th><th>Nº Registro</th><th>Estado</th><th>Resultados</th>
                </tr></thead>
                <tbody>
                    <tr th:each="e : ${estudiantes}">
                        <td th:text="${e.usuario.documento}"></td>
                        <td th:text="${e.usuario.nombreCompleto}"></td>
                        <td th:text="${e.programa?.nombre ?: '-'}"></td>
                        <td th:text="${e.semestre}"></td>
                        <td th:text="${e.numeroRegistro ?: '-'}"></td>
                        <td><span class="badge-active" th:if="${e.activo}">Activo</span></td>
                        <td th:text="${e.resultados.size()}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>
<script>$(document).ready(function(){ $('#tablaEstudiantes').DataTable({language:{url:'https://cdn.datatables.net/plug-ins/1.13.8/i18n/es-ES.json'}}); });</script>
</body></html>
