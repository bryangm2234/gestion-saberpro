<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><title>Gestión Alumnos</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css"/>
    <style>
        *{font-family:'Segoe UI',sans-serif;} body{background:#f0f4f8;}
        .topbar{background:#0d1f3c;color:#fff;padding:.85rem 1.75rem;display:flex;justify-content:space-between;align-items:center;}
        .card-panel{background:#fff;border-radius:14px;border:1px solid #e2e8f0;overflow:hidden;margin-bottom:1.5rem;}
        .card-header-custom{background:linear-gradient(135deg,#1a2f5e,#0d1f3c);color:#fff;padding:.9rem 1.5rem;display:flex;align-items:center;gap:.6rem;}
        .card-header-custom h6{margin:0;font-weight:600;}
        .table thead th{background:#0d1f3c;color:#fff;font-size:.78rem;}
        .table tbody td{font-size:.82rem;vertical-align:middle;}
        .badge-active{background:#dcfce7;color:#166534;border-radius:4px;padding:.15rem .5rem;font-size:.72rem;font-weight:600;}
        .form-label{font-size:.78rem;font-weight:600;color:#4a5568;}
        .form-control,.form-select{font-size:.82rem;border-color:#e2e8f0;background:#f7f9fc;}
        .btn-create{background:#1a2f5e;color:#fff;border:none;border-radius:8px;font-size:.82rem;padding:.5rem 1.2rem;}
        .btn-deact{background:#fee2e2;color:#991b1b;border:none;border-radius:6px;padding:.25rem .6rem;font-size:.73rem;text-decoration:none;display:inline-block;}
        .btn-calific{background:#dcfce7;color:#166534;border:none;border-radius:6px;padding:.25rem .6rem;font-size:.73rem;text-decoration:none;display:inline-block;}
    </style>
</head>
<body>
<div class="topbar">
    <span class="fw-bold"><i class="bi bi-people me-2" style="color:#D4AF37;"></i>Gestión de Alumnos</span>
    <a th:href="@{/coordinador/dashboard}" class="btn btn-sm btn-outline-light">← Volver al Panel</a>
</div>
<div class="container-fluid p-4">
    <!-- Formulario crear -->
    <div class="card-panel">
        <div class="card-header-custom">
            <i class="bi bi-person-plus-fill" style="color:#D4AF37;"></i>
            <h6>Registrar Nuevo Estudiante</h6>
        </div>
        <div class="p-3">
            <form th:action="@{/coordinador/estudiantes/crear}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="row g-2">
                    <div class="col-md-2"><label class="form-label">Nº Documento</label><input type="text" name="documento" class="form-control form-control-sm" required/></div>
                    <div class="col-md-2"><label class="form-label">Primer Nombre</label><input type="text" name="primerNombre" class="form-control form-control-sm" required/></div>
                    <div class="col-md-2"><label class="form-label">Segundo Nombre</label><input type="text" name="segundoNombre" class="form-control form-control-sm"/></div>
                    <div class="col-md-2"><label class="form-label">Primer Apellido</label><input type="text" name="primerApellido" class="form-control form-control-sm" required/></div>
                    <div class="col-md-2"><label class="form-label">Segundo Apellido</label><input type="text" name="segundoApellido" class="form-control form-control-sm"/></div>
                    <div class="col-md-3"><label class="form-label">Correo</label><input type="email" name="correo" class="form-control form-control-sm" required/></div>
                    <div class="col-md-2"><label class="form-label">Teléfono</label><input type="text" name="telefono" class="form-control form-control-sm"/></div>
                    <div class="col-md-2"><label class="form-label">Nº Registro</label><input type="text" name="numeroRegistro" class="form-control form-control-sm"/></div>
                    <div class="col-md-1"><label class="form-label">Semestre</label><input type="number" name="semestre" class="form-control form-control-sm" value="10" min="1" max="10" required/></div>
                    <div class="col-md-3"><label class="form-label">Programa</label>
                        <select name="programaId" class="form-select form-select-sm" required>
                            <option value="">Selecciona</option>
                            <option th:each="p:${programas}" th:value="${p.id}" th:text="${p.nombre}"></option>
                        </select>
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button type="submit" class="btn btn-create w-100 btn-sm"><i class="bi bi-person-check me-1"></i>Crear</button>
                    </div>
                </div>
                <small class="text-muted mt-1 d-block"><i class="bi bi-info-circle me-1"></i>Contraseña inicial = número de documento.</small>
            </form>
        </div>
    </div>

    <!-- Lista estudiantes -->
    <div class="card-panel">
        <div class="card-header-custom">
            <i class="bi bi-people-fill" style="color:#D4AF37;"></i>
            <h6>Listado de Estudiantes</h6>
        </div>
        <div class="table-responsive">
            <table class="table table-hover mb-0 datatable" id="tablaEstudiantes">
                <thead><tr>
                    <th>Documento</th><th>Nombre Completo</th><th>Programa</th>
                    <th>Semestre</th><th>Nº Registro</th><th>Estado</th>
                    <th>Resultados</th><th>Acciones</th>
                </tr></thead>
                <tbody>
                    <tr th:each="e:${estudiantes}">
                        <td th:text="${e.usuario.documento}"></td>
                        <td th:text="${e.usuario.nombreCompleto}"></td>
                        <td th:text="${e.programa?.nombre ?: '-'}"></td>
                        <td th:text="${e.semestre}"></td>
                        <td th:text="${e.numeroRegistro ?: '-'}"></td>
                        <td>
                            <span class="badge-active" th:if="${e.activo}">Activo</span>
                            <span style="background:#fee2e2;color:#991b1b;border-radius:4px;padding:.15rem .5rem;font-size:.72rem;font-weight:600;" th:unless="${e.activo}">Inactivo</span>
                        </td>
                        <td th:text="${e.resultados.size()}"></td>
                        <td class="d-flex gap-1 flex-wrap">
                            <a th:href="@{/coordinador/estudiantes/calificar/{id}(id=${e.id})}" class="btn-calific">
                                <i class="bi bi-pencil-square me-1"></i>Calificar
                            </a>
                            <a th:if="${e.activo}" th:href="@{/coordinador/estudiantes/desactivar/{id}(id=${e.id})}"
                               class="btn-deact" onclick="return confirm('¿Desactivar?')">
                                <i class="bi bi-person-dash"></i>
                            </a>
                            <a th:unless="${e.activo}" th:href="@{/coordinador/estudiantes/activar/{id}(id=${e.id})}"
                               class="btn-calific" style="background:#eff6ff;color:#1d4ed8;">
                                <i class="bi bi-person-check"></i>
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>
<script>$(document).ready(function(){ $('#tablaEstudiantes').DataTable({language:{url:'https://cdn.datatables.net/plug-ins/1.13.8/i18n/es-ES.json'},pageLength:15}); });</script>
</body>
</html>
